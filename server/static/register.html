<!DOCTYPE html>
<html class="dark" lang="ko">
<head>
  <meta charset="utf-8" />
  <title>회원가입 - TradeWise</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <link href="data:image/x-icon;base64," rel="icon" type="image/x-icon" />
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#137fec",
            "background-light": "#f6f7f8",
            "background-dark": "#101922",
          },
          fontFamily: {
            display: ["Inter"],
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
        },
      },
    };
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-200">
  <div class="flex min-h-screen flex-col">
    <header class="flex items-center justify-between border-b border-gray-200/10 dark:border-white/10 px-6 py-3">
      <a href="/" class="flex items-center gap-2">
        <svg class="h-8 w-8 text-primary" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2L2 7L12 12L22 7L12 2Z"></path>
          <path d="M2 17L12 22L22 17L12 12L2 17Z"></path>
          <path d="M2 12L12 17L22 12L12 7L2 12Z"></path>
        </svg>
        <span class="text-xl font-bold text-gray-900 dark:text-white">TradeWise</span>
      </a>
      <div class="text-sm">
        <span class="text-gray-500 dark:text-gray-400">이미 계정이 있나요?</span>
        <a href="/login" class="ml-2 font-semibold text-primary hover:underline">로그인</a>
      </div>
    </header>

    <main class="flex flex-1 items-center justify-center px-4 py-8">
      <div class="w-full max-w-md rounded-xl bg-background-light/70 dark:bg-background-dark/70 p-6 shadow-md ring-1 ring-gray-200/60 dark:ring-gray-700/60">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-1">회원가입</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
          이메일과 비밀번호를 입력해 새 계정을 만들어요.
        </p>

        <form id="register-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">이메일</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              class="block w-full rounded-lg border-gray-300 dark:border-gray-700 bg-background-light dark:bg-background-dark px-3 py-2 text-sm shadow-sm focus:border-primary focus:ring-primary"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">닉네임</label>
            <input
              type="text"
              id="nickname"
              name="nickname"
              required
              class="block w-full rounded-lg border-gray-300 dark:border-gray-700 bg-background-light dark:bg-background-dark px-3 py-2 text-sm shadow-sm focus:border-primary focus:ring-primary"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">비밀번호</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="block w-full rounded-lg border-gray-300 dark:border-gray-700 bg-background-light dark:bg-background-dark px-3 py-2 text-sm shadow-sm focus:border-primary focus:ring-primary"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">비밀번호 확인</label>
            <input
              type="password"
              id="passwordConfirm"
              name="passwordConfirm"
              required
              class="block w-full rounded-lg border-gray-300 dark:border-gray-700 bg-background-light dark:bg-background-dark px-3 py-2 text-sm shadow-sm focus:border-primary focus:ring-primary"
            />
          </div>

          <div id="message" class="mt-1 text-xs text-red-500"></div>

          <button
            type="submit"
            class="mt-2 w-full rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary/80 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
          >
            회원가입
          </button>
        </form>

        <p class="mt-4 text-center text-xs text-gray-500 dark:text-gray-400">
          홈으로 돌아가기
          <a href="/" class="font-semibold text-primary hover:underline ml-1">TradeWise 홈</a>
        </p>
      </div>
    </main>
  </div>

  <script src="/static/js/register.js"></script>
</body>
</html>
