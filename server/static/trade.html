<!DOCTYPE html>
<html class="dark" lang="ko">
<head>
  <meta charset="utf-8" />
  <title>주식 거래 - TradeWise</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <link href="data:image/x-icon;base64," rel="icon" type="image/x-icon" />
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#137fec",
            "background-light": "#f6f7f8",
            "background-dark": "#101922",
          },
          fontFamily: {
            display: ["Inter"],
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
        },
      },
    };
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-200">
  <div class="flex min-h-screen flex-col">
    <header class="flex items-center justify-between border-b border-gray-200/10 dark:border-white/10 px-6 py-3">
      <a href="/" class="flex items-center gap-2">
        <svg class="h-8 w-8 text-primary" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2L2 7L12 12L22 7L12 2Z"></path>
          <path d="M2 17L12 22L22 17L12 12L2 17Z"></path>
          <path d="M2 12L12 17L22 12L12 7L2 12Z"></path>
        </svg>
        <span class="text-xl font-bold text-gray-900 dark:text-white">TradeWise</span>
      </a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="/" class="text-gray-600 dark:text-gray-300 hover:text-primary">홈</a>
        <a href="/markets/me/page" class="text-gray-600 dark:text-gray-300 hover:text-primary">내 마켓</a>
      </nav>
    </header>

    <main class="flex-1 p-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-4">주식 거래</h1>

      <div
        id="trade-root"
        data-market-id="{{ market_id }}"
        data-company-id="{{ company_id }}"
        class="rounded-lg bg-background-light/80 dark:bg-background-dark/80 p-4 text-sm shadow-sm ring-1 ring-gray-200/70 dark:ring-gray-700/70"
      >
        <div
          id="orderbook-area"
          class="mb-4 rounded-md bg-gray-100/70 dark:bg-gray-800/70 px-3 py-2 text-xs text-gray-600 dark:text-gray-300"
        >
          호가 정보 로딩 중...
        </div>

        <div class="border-t border-gray-200 dark:border-gray-700 my-3"></div>

        <h2 class="text-base font-semibold text-gray-900 dark:text-white mb-3">주문 입력</h2>
        <form id="order-form" class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">매수/매도</label>
            <select
              name="side"
              class="block w-full rounded-lg border-gray-300 dark:border-gray-700 bg-background-light dark:bg-background-dark px-3 py-2 text-xs shadow-sm focus:border-primary focus:ring-primary"
            >
              <option value="BUY">매수</option>
              <option value="SELL">매도</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">수량</label>
            <input
              type="number"
              name="quantity"
              min="1"
              required
              class="block w-full rounded-lg border-gray-300 dark:border-gray-700 bg-background-light dark:bg-background-dark px-3 py-2 text-xs shadow-sm focus:border-primary focus:ring-primary"
            />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">가격</label>
            <input
              type="number"
              step="0.01"
              name="price"
              required
              class="block w-full rounded-lg border-gray-300 dark:border-gray-700 bg-background-light dark:bg-background-dark px-3 py-2 text-xs shadow-sm focus:border-primary focus:ring-primary"
            />
          </div>
          <div class="md:col-span-3">
            <button
              type="submit"
              class="w-full rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary/80 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
            >
              주문 보내기
            </button>
          </div>
        </form>

        <div id="order-result" class="mt-3 text-xs text-gray-700 dark:text-gray-300"></div>
      </div>
    </main>
  </div>

  <script src="/static/js/trade.js"></script>
</body>
</html>
