<!DOCTYPE html>
<html class="dark" lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>TradeWise</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="data:image/x-icon;base64," rel="icon" type="image/x-icon" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              display: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .form-select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 0.5rem center;
        background-repeat: no-repeat;
        background-size: 1.5em 1.5em;
        padding-right: 2.5rem;
        -webkit-print-color-adjust: exact;
        color-adjust: exact;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-gray-800 dark:text-gray-200"
  >
    <div class="flex h-screen w-full flex-col">
      <!-- 헤더 -->
      <header
        class="flex w-full items-center justify-between border-b border-gray-200/10 dark:border-white/10 px-6 py-3"
      >
        <div class="flex items-center gap-6">
          <div class="flex items-center gap-2">
            <svg
              class="h-8 w-8 text-primary"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path d="M12 2L2 7L12 12L22 7L12 2Z"></path>
              <path d="M2 17L12 22L22 17L12 12L2 17Z"></path>
              <path d="M2 12L12 17L22 12L12 7L2 12Z"></path>
            </svg>
            <h1 class="text-xl font-bold text-gray-900 dark:text-white">
              TradeWise
            </h1>
          </div>

          <!-- 검색 (데코) -->

        </div>

        <div class="flex items-center gap-4">
          <!-- 로그인/로그아웃 영역 -->
          <div id="auth-controls" class="flex items-center gap-2 text-sm">
            <!-- JS에서 채움 -->
          </div>



        </div>
      </header>

      <!-- 메인 -->
      <main class="grid flex-1 grid-cols-12 gap-6 p-6">
        <!-- 왼쪽: 마켓 & 회사 리스트 -->
        <aside class="col-span-12 lg:col-span-3">
          <div
            class="rounded-lg bg-background-light/50 dark:bg-background-dark/50 p-4 ring-1 ring-inset ring-gray-300/50 dark:ring-gray-700/50 h-full"
          >
            <h2
              class="px-2 text-lg font-semibold text-gray-900 dark:text-white"
            >
              내가 참가한 마켓
            </h2>
            <ul id="joined-markets" class="mt-2 space-y-1" role="list">
              <!-- JS에서 채움 -->
            </ul>

            <h3
              class="mt-4 px-2 text-md font-semibold text-gray-900 dark:text-white"
            >
              상장 회사
            </h3>
            <div class="mt-2 max-h-64 overflow-y-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="text-left text-gray-500 text-xs">
                    <th class="px-2 py-1">티커</th>
                    <th class="px-2 py-1">회사명</th>
                    <th class="px-2 py-1 text-right">현재가</th>
                  </tr>
                </thead>
                <tbody id="company-table-body">
                  <tr>
                    <td
                      class="px-2 py-2 text-xs text-gray-500"
                      colspan="3"
                    >
                      마켓을 먼저 선택하세요.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
              <div id="markets-area" class="mt-4"></div>
          </div>

        </aside>

        <!-- 중앙 + 오른쪽 -->
        <div class="col-span-12 lg:col-span-9 grid grid-cols-3 gap-6">
          <!-- 중앙 카드: 마켓 상세 / 회사 상세를 토글 -->
          <div class="col-span-3 xl:col-span-2">
            <div
              class="h-full rounded-lg bg-background-light/50 dark:bg-background-dark/50 p-4 ring-1 ring-inset ring-gray-300/50 dark:ring-gray-700/50"
            >
              <!-- 마켓 상세 패널 -->
              <div id="market-detail-panel">
                <div class="flex items-start justify-between">
                  <div>
                    <h2
                      id="market-name"
                      class="text-2xl font-bold text-gray-900 dark:text-white"
                    >
                      마켓을 선택하세요
                    </h2>
                    <p
                      id="market-created-at"
                      class="mt-1 text-sm text-gray-500 dark:text-gray-400"
                    >
                      -
                    </p>
                    <p
                      class="mt-2 text-sm text-gray-700 dark:text-gray-200"
                    >
                      참가자 수:
                      <span
                        id="market-participants-count"
                        class="font-semibold"
                        >-</span
                      >
                      명
                    </p>
                    <p
                      class="mt-1 text-xs text-gray-500 dark:text-gray-400"
                    >
                      회사 목록에서 회사를 선택하면 차트/주문/호가가 표시됩니다.
                    </p>
                  </div>
                  <div class="flex flex-col items-end gap-2">
                    <button
                      id="btn-create-company-main"
                      type="button"
                      class="hidden rounded-full bg-primary px-4 py-1.5 text-xs font-semibold text-white shadow-sm hover:bg-primary/80"
                    >
                      회사 생성
                    </button>
                  </div>
                </div>

                <!-- 참가자 간단 리스트 -->
                <div
                  id="market-participants-list"
                  class="mt-4 max-h-40 overflow-y-auto border-t border-gray-200/60 dark:border-gray-700/60 pt-3 text-sm"
                >
                  <!-- JS에서 채움 -->
                </div>
              </div>

              <!-- 회사 상세 패널 -->
              <div id="company-panel" class="hidden">
                <div class="flex items-start justify-between">
                  <div>
                    <h2
                      class="text-2xl font-bold text-gray-900 dark:text-white"
                      id="main-symbol"
                    >
                      종목을 선택하세요
                    </h2>
                    <p
                      class="mt-1 text-xl font-medium text-gray-500 dark:text-gray-400"
                      id="main-company-name"
                    >
                      -
                    </p>
                    <p
                      class="mt-2 text-3xl font-bold text-gray-900 dark:text-white"
                      id="main-price"
                    >
                      -
                    </p>
                    <p
                      class="text-md font-medium"
                      id="main-change-text"
                    ></p>
                  </div>
                  <div
                    class="flex gap-1 rounded-lg bg-background-light dark:bg-background-dark p-1"
                  >
                    <button
                      class="px-3 py-1 text-sm font-semibold rounded text-white bg-primary"
                      type="button"
                    >
                      1D
                    </button>
                    <button
                      class="px-3 py-1 text-sm font-semibold rounded text-gray-700 dark:text-gray-300 hover:bg-primary/10"
                      type="button"
                    >
                      5D
                    </button>
                    <button
                      class="px-3 py-1 text-sm font-semibold rounded text-gray-700 dark:text-gray-300 hover:bg-primary/10"
                      type="button"
                    >
                      1M
                    </button>
                    <button
                      class="px-3 py-1 text-sm font-semibold rounded text-gray-700 dark:text-gray-300 hover:bg-primary/10"
                      type="button"
                    >
                      6M
                    </button>
                    <button
                      class="px-3 py-1 text-sm font-semibold rounded text-gray-700 dark:text-gray-300 hover:bg-primary/10"
                      type="button"
                    >
                      YTD
                    </button>
                  </div>
                </div>

                <!-- 차트 -->
                <div class="mt-4 h-[300px] w-full">
                  <div
                    id="chart-placeholder"
                    class="flex h-full w-full items-center justify-center rounded-lg bg-gray-200/50 dark:bg-gray-800/50"
                  >
                    <p class="text-gray-500">
                      마켓과 회사를 선택하면 차트가 표시됩니다.
                    </p>
                  </div>
                  <canvas
                    id="price-chart"
                    class="hidden h-full w-full rounded-lg bg-gray-200/50 dark:bg-gray-800/50"
                  ></canvas>
                </div>

                <!-- 회사 요약 행 -->
                <div
                  id="company-summary-row"
                  class="mt-4 grid grid-cols-6 gap-4 text-sm"
                >
                  <div>
                    <p class="text-xs text-gray-500">티커</p>
                    <p id="cs-ticker" class="font-semibold">-</p>
                  </div>
                  <div>
                    <p class="text-xs text-gray-500">회사명</p>
                    <p id="cs-name" class="font-semibold">-</p>
                  </div>
                  <div>
                    <p class="text-xs text-gray-500">현재가</p>
                    <p id="cs-current" class="font-semibold">-</p>
                  </div>
                  <div>
                    <p class="text-xs text-gray-500">발행가</p>
                    <p id="cs-issued" class="font-semibold">-</p>
                  </div>
                  <div>
                    <p class="text-xs text-gray-500">등락</p>
                    <p id="cs-change" class="font-semibold">0.00</p>
                  </div>
                  <div>
                    <p class="text-xs text-gray-500">등락률(%)</p>
                    <p id="cs-change-rate" class="font-semibold">0%</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 오른쪽: 주문 패널 + 호가 -->
          <div class="col-span-3 xl:col-span-1 grid grid-rows-2 gap-6">
            <div
              class="rounded-lg bg-background-light/50 dark:bg-background-dark/50 p-4 ring-1 ring-inset ring-gray-300/50 dark:ring-gray-700/50"
            >
              <h2
                class="text-lg font-semibold text-gray-900 dark:text-white"
              >
                주문 패널
              </h2>
              <form id="order-form" class="mt-4 space-y-4">
                <div class="grid grid-cols-2 gap-2">
                  <button
                    type="button"
                    data-side="BUY"
                    id="btn-buy"
                    class="w-full rounded bg-green-500/20 py-2 text-sm font-semibold text-green-500 ring-1 ring-inset ring-green-500/30 hover:bg-green-500/30"
                  >
                    Buy
                  </button>
                  <button
                    type="button"
                    data-side="SELL"
                    id="btn-sell"
                    class="w-full rounded bg-red-500/20 py-2 text-sm font-semibold text-red-500 ring-1 ring-inset ring-red-500/30 hover:bg-red-500/30"
                  >
                    Sell
                  </button>
                </div>
                <input
                  type="hidden"
                  name="side"
                  id="order-side"
                  value="BUY"
                />

                <div>
                  <label
                    class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                    for="order-quantity"
                    >수량</label
                  >
                  <input
                    class="mt-1 block w-full rounded-lg border-gray-300 dark:border-gray-700 bg-background-light dark:bg-background-dark shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                    id="order-quantity"
                    name="quantity"
                    placeholder="0"
                    type="number"
                    min="1"
                    required
                  />
                </div>

                <div>
                  <label
                    class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                    for="order-price"
                    >가격</label
                  >
                  <input
                    class="mt-1 block w-full rounded-lg border-gray-300 dark:border-gray-700 bg-background-light dark:bg-background-dark shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                    id="order-price"
                    name="price"
                    placeholder="0.00"
                    type="number"
                    step="0.01"
                    required
                  />
                </div>

                <button
                  class="w-full rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary/80 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
                  type="submit"
                >
                  주문 보내기
                </button>
                <p
                  id="order-result"
                  class="text-xs text-gray-500 dark:text-gray-400"
                ></p>
              </form>
            </div>

            <div
              class="rounded-lg bg-background-light/50 dark:bg-background-dark/50 p-4 ring-1 ring-inset ring-gray-300/50 dark:ring-gray-700/50"
            >
              <h2
                class="text-lg font-semibold text-gray-900 dark:text-white"
              >
                호가
              </h2>
              <div id="orderbook-area" class="mt-2 text-sm">
                회사를 선택하면 호가가 표시됩니다.
              </div>

            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/static/js/home.js"></script>
  </body>
</html>
